<!DOCTYPE html>
<html>
<body>
<input id="pid" placeholder="ProductID">
<textarea id="memo" placeholder="メモ"></textarea>
<button onclick="save()">保存</button>

<script>
const url = "https://script.google.com/macros/s/AKfycbycq25J-ABO_qLz6RT5ViqrTQY4XjRKZqw-iRNP8OpzZOGGSmKIar6PgUsa2So6_AA9/exec";

function save(){
  fetch(url,{
    method:"POST",
    body: JSON.stringify({
      ProductID: document.getElementById("pid").value,
      memo: document.getElementById("memo").value
    })
  })
  .then(r=>r.json())
  .then(d=>alert(d.status))
  .catch(e=>alert("通信エラー"));
}
</script>
</body>
</html>
