<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>QR読み取り 現場アプリ</title>

<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

<style>
body { font-family: sans-serif; padding: 20px; background: #f7f7f7; }
h1 { text-align: center; margin-bottom: 10px; }

#scan-btn {
  width: 100%;
  padding: 20px;
  background: #0078d7;
  color: white;
  font-size: 22px;
  border: none;
  border-radius: 12px;
}

#reader { width: 100%; margin-top: 20px; }

#product-card {
  margin-top: 25px;
  padding: 20px;
  background: white;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
  display: none;
}

.label { font-weight: bold; margin-top: 10px; }
.value { margin-top: 5px; white-space: pre-wrap; }

/* 製造納期 */
.deadline{
  font-weight:bold;
}

/* アラート（小さめ） */
.alert{
  margin-top:5px;
  padding:6px;
  background:#ffdddd;
  color:#b00000;
  border-radius:6px;
  font-size:14px;
  display:none;
}

textarea {
  width: 100%;
  margin-top: 5px;
  padding: 8px;
  font-size: 16px;
  line-height: 1.6;
  min-height: 120px;
  box-sizing: border-box;
}

button.save-btn {
  margin-top: 10px;
  padding: 10px;
  width: 100%;
  background: #28a745;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 18px;
}
</style>
</head>

<body>

<h1>製品QRスキャン</h1>

<button id="scan-btn">QRコードを読み取る</button>

<div id="reader"></div>

<div id="product-card">

<div class="label">伝票番号</div>
<div id="pid" class="value">---</div>

<div class="label">品番</div>
<div id="pcode" class="value">---</div>

<div class="label">品名</div>
<div id="pname" class="value">---</div>

<div class="label">個数</div>
<div id="pqty" class="value">---</div>

<div class="label">納期</div>
<div id="pdate" class="value">---</div>

<div class="label">製造納期</div>
<div id="pmfgdate" class="value deadline">---</div>
<div id="alert" class="alert"></div>

<div class="label">素材</div>
<div id="pmaterial" class="value">---</div>

<div class="label">手順書（編集可）</div>
<textarea id="pmanual"></textarea>

<div class="label">クレーム履歴</div>
<div id="pclaim" class="value">---</div>

<div class="label">作業メモ履歴</div>
<div id="plog" class="value">---</div>

<div class="label">新規メモ入力</div>
<textarea id="pnote"></textarea>

<button class="save-btn" onclick="saveData()">保存</button>

</div>

<script>

const sheetApiUrl = "https://script.google.com/macros/s/AKfycbxXdarpEh-3AY0qrF6FIlMvHu6kcagIq3KiTYWSWPN-7QusVX8M_2Sc31XzbRuNWpMP/exec";

let scanning = false;
let allData = [];
let header = [];
let html5QrCode = null;

/* 初期データ取得 */

async function preloadData(){
 const res = await fetch(sheetApiUrl);
 const data = await res.json();
 header = data[0];
 allData = data;
}

preloadData();

/* QR読み取り */

document.getElementById("scan-btn").onclick = async () => {

 if(scanning) return;

 scanning = true;

 html5QrCode = new Html5Qrcode("reader");

 const config = { fps:10, qrbox:{width:250,height:250} };

 await html5QrCode.start(
  { facingMode:"environment"},
  config,
  async (qrMessage)=>{

   await html5QrCode.stop();
   await html5QrCode.clear();
   scanning=false;

   loadProductData(qrMessage.trim());

  }
 );

};

/* データ表示 */

function loadProductData(productId){

 const idIndex = header.indexOf("ProductID");

 const rowIndex = allData.findIndex(
  r => String(r[idIndex]) === String(productId)
 );

 if(rowIndex === -1){
  alert("データなし");
  return;
 }

 document.getElementById("product-card").style.display="block";

 const row = allData[rowIndex];

 document.getElementById("pid").textContent = productId;
 document.getElementById("pcode").textContent = row[header.indexOf("品番")];
 document.getElementById("pname").textContent = row[header.indexOf("品名")];
 document.getElementById("pqty").textContent = row[header.indexOf("個数")];
 document.getElementById("pmaterial").textContent = row[header.indexOf("素材")];

 /* 納期 */

 const rawDate = row[header.indexOf("納期")];
 const dateObj = new Date(rawDate);

 const dueDate =
 `${dateObj.getFullYear()}/${dateObj.getMonth()+1}/${dateObj.getDate()}`;

 document.getElementById("pdate").textContent = dueDate;

 /* 製造納期（納期−7日） */

 const mfgDate = new Date(dateObj);
 mfgDate.setDate(mfgDate.getDate()-7);

 const mfgText =
 `${mfgDate.getFullYear()}/${mfgDate.getMonth()+1}/${mfgDate.getDate()}`;

 document.getElementById("pmfgdate").textContent = mfgText;

 /* アラート */

 const today = new Date();

 const diff =
 Math.floor((mfgDate - today)/(1000*60*60*24));

 const alertBox = document.getElementById("alert");

 if(diff <=3){

  alertBox.style.display="block";
  alertBox.textContent =
  "⚠ 製造納期まで "+diff+" 日";

 }else{

  alertBox.style.display="none";

 }

 document.getElementById("pmanual").value =
 row[header.indexOf("手順書")] || "";

 document.getElementById("pclaim").textContent =
 row[header.indexOf("クレーム履歴")] || "";

 document.getElementById("plog").textContent =
 row[header.indexOf("作業メモ履歴")] || "";

 document.getElementById("pnote").value="";

}

/* 保存 */

function saveData(){

 const productId = document.getElementById("pid").textContent;

 const manual = document.getElementById("pmanual").value;

 const note = document.getElementById("pnote").value;

 fetch(sheetApiUrl,{
  method:"POST",
  body:JSON.stringify({
   ProductID:productId,
   手順書:manual,
   memo:note
  })
 })
 .then(res=>res.json())
 .then(data=>{

  alert("保存しました");

  preloadData();

 });

}

</script>

</body>
</html>
