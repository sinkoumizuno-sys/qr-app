




<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>QR読み取り 現場アプリ</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:sans-serif;
padding:20px;
background:#f7f7f7;
}

#scan-btn{
width:100%;
padding:20px;
font-size:22px;
background:#0078d7;
color:white;
border:none;
border-radius:12px;
}

#reader{
margin-top:20px;
}

#product-card{
margin-top:25px;
padding:20px;
background:white;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.15);
display:none;
}

.label{
font-weight:bold;
margin-top:10px;
}

.value{
margin-top:5px;
}



.alert-box{

display:none;
margin-top:10px;
padding:15px;
background:#ff3b3b;
color:white;
font-size:22px;
font-weight:bold;
text-align:center;
border-radius:10px;

animation:blink 1s infinite;

}

@keyframes blink{

0%{opacity:1;}
50%{opacity:0.3;}
100%{opacity:1;}

}

textarea{
width:100%;
margin-top:5px;
padding:8px;
font-size:16px;
line-height:1.6;
min-height:120px;
box-sizing:border-box;
}

button.save-btn{

margin-top:10px;
padding:10px;
width:100%;
background:#28a745;
color:white;
border:none;
border-radius:8px;
font-size:18px;

}

</style>
</head>

<body>

<h1>製品QRスキャン</h1>

<button id="scan-btn">QRコードを読み取る</button>

<div id="reader"></div>

<div id="product-card">

<div class="label">伝票番号</div>
<div id="pid" class="value"></div>

<div class="label">品番</div>
<div id="pcode" class="value"></div>

<div class="label">品名</div>
<div id="pname" class="value"></div>

<div class="label">個数</div>
<div id="pqty" class="value"></div>

<div class="label">製造納期</div>
<div id="pmdate" class="deadline">---</div>

<div id="alert" class="alert-box">
⚠ 製造納期まで3日以内です
</div>

<div class="label">納期</div>
<div id="pdate" class="value"></div>

<div class="label">素材</div>
<div id="pmaterial" class="value"></div>

<div class="label">手順書</div>
<textarea id="pmanual"></textarea>

<div class="label">クレーム履歴</div>
<div id="pclaim" class="value"></div>

<div class="label">作業メモ履歴</div>
<div id="plog" class="value"></div>

<div class="label">新規メモ</div>
<textarea id="pnote"></textarea>

<button class="save-btn" onclick="saveData()">保存</button>

</div>

<script>

const sheetApiUrl="https://script.google.com/macros/s/AKfycbxXdarpEh-3AY0qrF6FIlMvHu6kcagIq3KiTYWSWPN-7QusVX8M_2Sc31XzbRuNWpMP/exec";

let header=[];
let allData=[];

async function preloadData(){

const res=await fetch(sheetApiUrl);
const data=await res.json();

header=data[0];
allData=data;

}

preloadData();


// QRスキャン

const html5QrCode=new Html5Qrcode("reader");

document.getElementById("scan-btn").onclick=async()=>{

await html5QrCode.start(
{facingMode:"environment"},
{fps:10,qrbox:250},
(qrMessage)=>{

html5QrCode.stop();
loadProductData(qrMessage.trim());

}
);

};


// データ表示

function loadProductData(productId){

const idIndex=header.indexOf("ProductID");

const rowIndex=
allData.findIndex(r=>String(r[idIndex])===String(productId));

if(rowIndex==-1){

alert("該当データなし");
return;

}

const row=allData[rowIndex];

document.getElementById("product-card").style.display="block";

document.getElementById("pid").textContent=productId;
document.getElementById("pcode").textContent=row[header.indexOf("品番")];
document.getElementById("pname").textContent=row[header.indexOf("品名")];
document.getElementById("pqty").textContent=row[header.indexOf("個数")];
document.getElementById("pmaterial").textContent=row[header.indexOf("素材")];

document.getElementById("pmanual").value=row[header.indexOf("手順書")]||"";
document.getElementById("pclaim").textContent=row[header.indexOf("クレーム履歴")]||"";
document.getElementById("plog").textContent=row[header.indexOf("作業メモ履歴")]||"";


// ===== 製造納期 =====

const rawMDate=row[header.indexOf("製造納期")];

let formattedMDate="-";

if(rawMDate){

const mDate=new Date(rawMDate);

formattedMDate=
`${mDate.getFullYear()}/${String(mDate.getMonth()+1).padStart(2,"0")}/${String(mDate.getDate()).padStart(2,"0")}`;

document.getElementById("pmdate").textContent=formattedMDate;


// ===== 3日前アラート =====

const today=new Date();
today.setHours(0,0,0,0);

const diff=(mDate-today)/(1000*60*60*24);

if(diff<=3){

document.getElementById("alert").style.display="block";

}else{

document.getElementById("alert").style.display="none";

}

}


// ===== 納期 =====

const rawDate=row[header.indexOf("納期")];

if(rawDate){

const d=new Date(rawDate);

const formatted=
`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")}`;

document.getElementById("pdate").textContent=formatted;

}

}


// 保存

function saveData(){

const productId=document.getElementById("pid").textContent;
const manual=document.getElementById("pmanual").value;
const note=document.getElementById("pnote").value;

fetch(sheetApiUrl,{
method:"POST",
body:JSON.stringify({
ProductID:productId,
手順書:manual,
memo:note
})
})
.then(r=>r.json())
.then(()=>{

alert("保存しました");

});

}

</script>

</body>
</html>
